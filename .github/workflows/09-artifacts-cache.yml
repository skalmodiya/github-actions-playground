name: "Lesson 09 - Artifacts and Cache"

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create build output
        run: |
          mkdir -p dist
          echo "Build output for run ${{ github.run_number }}" > dist/app.txt
          echo "Timestamp: $(date)" >> dist/app.txt
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.run_number }}
          path: dist/
          retention-days: 7

  download-and-use:
    runs-on: ubuntu-latest
    needs: build-and-upload
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.run_number }}
          path: downloaded/

      - name: Use artifact
        run: |
          echo "Downloaded files:"
          cat downloaded/app.txt

  cached-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies (uses cache if available)
        run: |
          echo "Cache hit: ${{ steps.cache-node.outputs.cache-hit }}"
          # npm install would use cache from above

      - name: Cache custom directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/myapp
            /tmp/build-cache
          key: myapp-cache-${{ github.run_id }}
          restore-keys: myapp-cache-
