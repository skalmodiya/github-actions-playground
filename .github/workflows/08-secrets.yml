name: "Lesson 08 - Secrets and Security"

on:
  workflow_dispatch:

jobs:
  use-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Use a secret safely
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          echo "Secret is set: ${{ secrets.MY_SECRET != '' }}"
          # Never print secret value — GitHub will mask it anyway
          echo "Length hint: ${#MY_SECRET} characters"

      - name: Secrets are masked in logs
        run: |
          echo "If MY_SECRET were 'hunter2', it shows as ***"
          # GitHub automatically masks secret values in log output

      - name: Built-in GITHUB_TOKEN
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GITHUB_TOKEN is automatically provided"
          echo "Use it to call GitHub API without storing PATs"

      - name: Call GitHub API with GITHUB_TOKEN
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }} \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Repo stars:', d.get('stargazers_count','N/A'))"

  oidc-example:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Show OIDC token is available
        run: |
          echo "OIDC allows passwordless auth to cloud providers"
          echo "No secrets needed — GitHub issues a short-lived JWT"
          echo "id-token: write permission is required"
